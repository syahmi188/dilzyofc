<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pembayaran</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom right, #0f2027, #203a43, #2c5364);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

.container {
  z-index: 2;
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  padding: 2rem;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0, 255, 255, 0.1);
  animation: fadeInUp 1s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h2 {
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
  color: #ffffff;
  text-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
}

p {
  margin: 0.5rem 0;
  font-size: 1rem;
  color: #e0e0e0;
}

.payment-option {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 1.2rem;
  margin-top: 2rem;
}

.payment-option img {
  width: 60px;
  height: 60px;
  border-radius: 12px;
  padding: 10px;
  background: #1e1e1e;
  cursor: pointer;
  transition: all 0.3s ease;
}

.payment-option img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(0, 255, 200, 0.3);
}

.btn {
  margin-top: 2rem;
  padding: 12px 28px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #00ffc3, #0070ff);
  color: white;
  cursor: pointer;
  transition: 0.3s ease;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0, 255, 200, 0.4);
}

.popup {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.popup-content {
  background: #1b1b1b;
  padding: 2rem;
  border-radius: 12px;
  text-align: center;
  width: 90%;
  max-width: 350px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

.popup-content img {
  max-width: 100%;
  margin-bottom: 1rem;
  border-radius: 8px;
}

.popup-content button {
  padding: 10px 20px;
  background: #00b386;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 1rem;
  cursor: pointer;
}

.popup-content button:hover {
  background: #009966;
}

  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="container">
    <h2 id="product-name">Produk</h2>
    <p id="product-desc">Deskripsi produk akan muncul di sini.</p>
    <p><strong>Pilih metode pembayaran:</strong></p>
    <div class="payment-option">
      <img src="https://images.seeklogo.com/logo-png/39/1/quick-response-code-indonesia-standard-qris-logo-png_seeklogo-391791.png" alt="QRIS" onclick="pilihPembayaran('QRIS', 'https://img.sanishtech.com/u/198be9ef20e28304d7c96730d7a90efe.png')">
    </div>
    <button class="btn" onclick="selesaiBayar()">Selesai Bayar</button>
  </div>  <!-- Popup -->  <div class="popup" id="popup">
    <div class="popup-content" id="popup-content">
      <h3 id="popup-title">Metode</h3>
      <p id="popup-info"></p>
      <img id="popup-img" style="display:none">
      <button id="popup-btn">Tutup</button>
    </div>
  </div>  <div class="popup" id="alert-popup">
    <div class="popup-content">
      <h3>Peringatan!</h3>
      <p>Silakan pilih metode pembayaran terlebih dahulu.</p>
      <button onclick="document.getElementById('alert-popup').style.display='none'">Oke</button>
    </div>
  </div>  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    const stars = Array(120).fill().map(() => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3
    }));

    function animateStars() {
      ctx.clearRect(0, 0, w, h);
      for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        star.x += star.dx;
        star.y += star.dy;

        if (star.x < 0 || star.x > w) star.dx *= -1;
        if (star.y < 0 || star.y > h) star.dy *= -1;
      }
      requestAnimationFrame(animateStars);
    }
    animateStars();

    const produkInfo = {
      "key-drip-1d": { nama: "Key Drip", harga: "Rp15.000", deskripsi: "ApkMod FreeFire" },
      "key-drip-3d": { nama: "Key Drip", harga: "Rp30.000", deskripsi: "ApkMod FreeFire" },
      "key-drip-7d": { nama: "Key Drip", harga: "Rp60.000", deskripsi: "ApkMod FreeFire" },
      "key-drip-15d": { nama: "Key Drip", harga: "R100.000", deskripsi: "ApkMod FreeFire" },
      "key-drip-30d": { nama: "Key Drip", harga: "Rp150.000", deskripsi: "ApkMod FreeFire" },
      "key-hg-1d": { nama: "Key Hg", harga: "Rp25.000", deskripsi: "ApkMod FreeFire" },
      "key-hg-7d": { nama: "Key Hg", harga: "Rp45.000", deskripsi: "ApkMod FreeFire" },
      "key-hg-10d": { nama: "Key Hg", harga: "Rp55.000", deskripsi: "ApkMod FreeFire" },
      "key-hg-30d": { nama: "Key Hg", harga: "Rp110.000", deskripsi: "ApkMod FreeFire" },
      "key-prime-1d": { nama: "Key Prime", harga: "Rp13.000", deskripsi: "ApkMod FreeFire" },
      "key-prime-3d": { nama: "Key Prime", harga: "Rp28.000", deskripsi: "ApkMod FreeFire" },
      "key-prime-7d": { nama: "Key Prime", harga: "Rp55.000", deskripsi: "ApkMod FreeFire" },
      "key-driproot-1d": { nama: "Drip Root", harga: "Rp18.000", deskripsi: "ApkMod FreeFire" },
      "key-driproot-7d": { nama: "Drip Root", harga: "Rp60.000", deskripsi: "ApkMod FreeFire" },
      "key-driproot-30d": { nama: "Drip Root", harga: "Rp150.000", deskripsi: "ApkMod FreeFire" }
    };

    const params = new URLSearchParams(location.search);
    const produk = params.get("produk");
    let selectedMethod = "";
    let selectedContact = "";

    if (produkInfo[produk]) {
      const p = produkInfo[produk];
      document.getElementById("product-name").textContent = `${p.nama} - ${p.harga}`;
      document.getElementById("product-desc").textContent = p.deskripsi;
    }

    function pilihPembayaran(metode, kontak) {
      selectedMethod = metode;
      selectedContact = kontak;
      const popup = document.getElementById("popup");
      const title = document.getElementById("popup-title");
      const info = document.getElementById("popup-info");
      const img = document.getElementById("popup-img");
      const btn = document.getElementById("popup-btn");

      title.textContent = `Bayar via ${metode}`;
      if (metode === "QRIS") {
        img.src = kontak;
        img.style.display = "block";
        info.textContent = "Scan kode QR dengan aplikasi e-wallet ALLPAYMENT.";
        btn.textContent = "Tutup";
        btn.onclick = () => popup.style.display = "none";
      } else {
        img.style.display = "none";
        info.textContent = `Nomor: ${kontak}`;
        btn.textContent = "Salin & Tutup";
        btn.onclick = () => {
          navigator.clipboard.writeText(kontak);
          popup.style.display = "none";
        };
      }
      popup.style.display = "flex";
    }

    function selesaiBayar() {
      if (!selectedMethod) {
        document.getElementById("alert-popup").style.display = "flex";
        return;
      }

      const p = produkInfo[produk];
      const pesan = `Halo, saya telah melakukan pembayaran.\n\nProduk: ${p.nama}\nHarga: ${p.harga}\nPembayaran via: ${selectedMethod}`;
      const url = `https://wa.me/6283161976396?text=${encodeURIComponent(pesan)}`;
      window.location.href = url;
    }
  </script></body>
</html>
